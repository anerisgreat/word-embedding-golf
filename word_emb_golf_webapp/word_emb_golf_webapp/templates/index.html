<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="application/json" id="graph_json">
    {{graph_json | safe }}
  </script>
</head>
<body onLoad="setup()">

<div class="container-fluid pt-5 pb-5 bg-white text-dark">
  <div class="row">
    <div class="col-sm-3 border" name="game-state-div">
      <h1>GAME STATE</h1>
    </div>
    <div class="col border" name="game-buttons-div">
      <table class="table table-borderless">
        <tbody>
            {% for tri in range(5) %}
            <tr>
                {% for tci in range(4) %}
                <td class="text-center">
                  <div class="d-flex">
                  <button type="button" class="btn btn-primary flex-grow-1 flex-lg-grow-0" id="neighbor-btn-{{tri*4 + tci}}">
                  </button>
                  </div>
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
      </table>
    </div>
    <div class="col-sm-3 border" name="game-map-div">
      <h1>MAP</h1>
    </div>
  </div>
</div>
<p id="test">
</p>
<script>
  var graph_dict = JSON.parse(document.getElementById('graph_json').innerHTML);

  var source_word = "";
  var current_word = "";
  var target_word = "";

  function random_element(arr){
      let i = Math.floor(Math.random() * arr.length);
      return arr[i];
  }

  function init_game(){
      all_words = Object.keys(graph_dict);
      source_word = random_element(all_words);
      target_word = random_element(all_words);
      current_word = source_word;
  }

  function update_word_buttons(word){
      document.getElementById("test").innerHTML = "not in";
      if(word in graph_dict){
          document.getElementById("test").innerHTML = word;
          var neighbors = graph_dict[word];
          for(let i = 0; i < 20; ++i){
              document.getElementById("neighbor-btn-" + i).innerHTML = neighbors[i];
          }
      }
  }

  function setup() {
      update_word_buttons("hello");
  }
</script>
</body>
</html>
