<!DOCTYPE html>
<html lang="en">
<head>
  <title>Word Embedding Golf</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.4/pako.min.js"></script>
  <script type="application/text" id="graph_gzip_base64">{{graph_gzip_base64}}</script>
<script>
  var graph_dict = get_graph_from_gzip_str(document.getElementById('graph_gzip_base64').innerHTML);

  var source_word = "";
  var current_word = "";
  var target_word = "";

  var current_path = [];

  var update_time = 0;
  var just_updated_path = false;

  const DIST_PER_SECOND = 1;

  function redraw_path(){
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");


      const canvas_height = canvas.height;
      const canvas_width = canvas.width;
      ctx.lineWidth = 1;
      ctx.clearRect(0, 0, canvas_width, canvas_height);

      var cc = graph_dict[current_path[0]]['tsne_emb'];
      ctx.moveTo(cc[0]*canvas_width, cc[1] * canvas_height);
      ctx.beginPath();

      for(let i = 0; i < current_path.length - 1; ++i){
        cc = graph_dict[current_path[i]]['tsne_emb'];
        ctx.lineTo(cc[0]*canvas_width, cc[1] * canvas_height);
      }
      var current_word_coords = null;

      if(just_updated_path){
          if(current_path.length > 1){
              cca = graph_dict[current_path[current_path.length - 1]]['tsne_emb'];
              ccb = graph_dict[current_path[current_path.length - 2]]['tsne_emb'];

              ccax = cca[0];
              ccbx = ccb[0];
              ccay = cca[1];
              ccby = ccb[1];

              ccxd = ccax - ccbx;
              ccyd = ccay - ccby;

              total_traverse_len = Math.sqrt(ccxd * ccxd + ccyd * ccyd);
              // update_time_seconds = time.getSeconds();
              // update_time_milliseconds = time.getMilliseconds();
              current_time = new Date();

              milliseconds_passed = (current_time - update_time);

              target_traverse_dist = (DIST_PER_SECOND / 1000 )* (milliseconds_passed);
              target_dist_as_frac = target_traverse_dist / total_traverse_len;
              if(target_dist_as_frac > 1){
                  target_dist_as_frac = 1;
                  just_updated_path = false;
              }

              ccx = ccbx + ccxd * target_dist_as_frac;
              ccy = ccby + ccyd * target_dist_as_frac;
              current_word_coords = [ccx, ccy];
              ctx.lineTo(ccx*canvas_width, ccy * canvas_height);
          } else {
              just_updated_path = false;
          }
      } else {
        current_word_coords = graph_dict[current_path[current_path.length - 1]]['tsne_emb'];
        ctx.lineTo(current_word_coords[0]*canvas_width, current_word_coords[1] * canvas_height);

      }
      ctx.stroke();

      ctx.beginPath();
      cc = graph_dict[source_word]['tsne_emb'];
      ctx.arc(cc[0]*canvas_width, cc[1]*canvas_height, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#00FF00";
      ctx.fill()
      ctx.beginPath();
      cc = graph_dict[target_word]['tsne_emb'];
      ctx.arc(cc[0]*canvas_width, cc[1]*canvas_height, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#FF0000";
      ctx.fill()
      ctx.beginPath();
      cc = graph_dict[current_word]['tsne_emb'];
      ctx.arc(current_word_coords[0]*canvas_width,
              current_word_coords[1]*canvas_height, 2, 0, 2 * Math.PI);
      ctx.fillStyle = "#0000FF";
      ctx.stroke()
  }

  function get_graph_from_gzip_str(gzip_str){
      //https://stackoverflow.com/questions/69179292/i-want-to-decompress-a-gzip-string-with-javascript
      const gziped_data = atob(gzip_str);
      const gziped_data_byte_array = Uint8Array.from(gziped_data,
                                                     c => c.charCodeAt(0));
      const ungziped_data = pako.ungzip(gziped_data_byte_array);
      const ungziped_json = new TextDecoder().decode(ungziped_data);
      const graph_dict = JSON.parse(ungziped_json);

      return graph_dict;
  }

  function random_element(arr){
      let i = Math.floor(Math.random() * arr.length);
      return arr[i];
  }

  function init_game(){
      all_words = Object.keys(graph_dict);
      source_word = random_element(all_words);
      target_word = random_element(all_words);
      current_word = source_word;
      update_word_buttons(current_word);
      current_path = [current_word];
      update_word_state();
  }

  function step_word_game(word){
      current_word = word;

      if(target_word == current_word){
          init_game();
          just_updated_path = false;
      } else {
          update_time = new Date();
          just_updated_path = true;

          update_word_buttons(current_word);
          current_path.push(current_word);
          update_word_state();
      }
  }

  function update_word_buttons(word){
      if(word in graph_dict){
          var neighbors = graph_dict[word]['neighbors'];
          for(let i = 0; i < 20; ++i){
              let buttonElem = document.getElementById("neighbor-btn-" + i);
              buttonElem.innerHTML = neighbors[i];
              buttonElem.dataset.word = neighbors[i];
          }
      }
  }

  function word_button_callback(elem){
      word = elem.dataset.word;
      step_word_game(word);
  }

  function update_word_state(){
      document.getElementById("source-td").innerHTML = source_word;
      document.getElementById("current-td").innerHTML = current_word;
      document.getElementById("target-td").innerHTML = target_word;

      redraw_path();
  }

  function setup() {
      init_game();
      setInterval(redraw_path, 50);
  }
</script>
</head>
<body onLoad="setup()">

<div class="container-fluid pt-5 pb-5 bg-white text-dark">
  <div class="row">
    <div class="col border text-center" id="game-state-div">
      <table class="table table-borderless">
        <tbody>
          <tr>
            <td>Source</td>
            <td id="source-td" class="font-weight-bold"></td>
          </tr>
          <tr>
            <td>Current</td>
            <td id="current-td" class="font-weight-bold"></td>
          </tr>
          <tr>
            <td>Target</td>
            <td id="target-td" class="font-weight-bold"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="col border" id="game-map-div">
      <canvas id="canvas" width="100" height="100"></canvas>
    </div>
  </div>
  <div class="row">
    <div class="col border" name="game-buttons-div">
      <table class="table table-borderless" style="table-layout:fixed;">
        <tbody>
            {% for tri in range(5) %}
            <tr>
                {% for tci in range(4) %}
                <td class="text-left">
                  <button type="button"
                            class="btn btn-dark w-100 px-1"
                            id="neighbor-btn-{{tri*4 + tci}}"
                            onclick="word_button_callback(this)">
                  </button>
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
<p id="test">
</p>

</body>
</html>
