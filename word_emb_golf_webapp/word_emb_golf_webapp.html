<!DOCTYPE html>
<html lang="en">
<head>
  <title>Word Embedding Golf</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.4/pako.min.js"></script> -->
  <script type="application/text" id="graph_gzip_base64">{{graph_gzip_base64}}</script>
  <script type="module" src="main.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<dialog id="game_start_dialog">
    <h2>Word Embedding Golf!</h2>
    <p>Select a difficulty and press the button!</p>
    <div class="dialog-selectbtn">
      <select id="game_start_dialog_difficulty_select">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="game_start_dialog_start_btn" class="button-16">Begin!</button>
    </div>
</dialog>
<dialog id="game_end_dialog">
    <h2>Game ended!</h2>
    <p>It took you <span id="game_end_dialog_n_steps">42</span> steps!</p>
    <p>
      The shortest path from
      <span id="game_end_dialog_source">Baldurdash</span>
      to
      <span id="game_end_dialog_target">Tiramisu</span>
      takes only
      <span id="game_end_dialog_n_shortest_path">42</span>
      steps!
    </p> <!--  -->
    <button id="game_end_dialog_start_btn" class="button-16">
      Start a new game!
    </button>
    <!-- This line is problematic, we'd need to figure out edgecases -->
    <!-- <p>You visited the word <span id="game_end_dialog_most_visited">Baldurdash</span> <span id="game_end_dialog_n_visited">42</span> times!</p> -->
</dialog>
<div class="container-fluid pt-5 pb-5 pl-5 pr-5 main-div" style="max-width: 500px;">
  <div class="row pb-2">
    <div class="col-4" id="game-state-div" style="background-color:transparent; display:table;">
      <div class="map-subsection">
        <div class="map-section">
          <button
            type="button"
            class="button-16"
            id="hint_btn">
            Hint
          </button>
        </div>
        <div class="map-section"><hr></div>
        <div id="source" class="source-word map-section"></div>
        <div class="arrow map-section">&#x2304;</div>
        <div id="current" class="map-section current-word"></div>
        <div class="arrow map-section">&#x2304;</div>
        <div id="target" class="map-section target-word"></div>
      </div>
    </div>
    <div class="col" id="game-map-div"style="padding:left; margin:0 auto;">
      <canvas id="canvas" style="width:100%; aspect-ratio: 1/1; height:auto;"></canvas>
    </div>
  </div>
  <div class="row"><hr></div>
  <div class="row">
    <div class="col" name="game-buttons-div">
      <table class="table table-borderless" style="table-layout:fixed;">
        <tbody>
            {% for tri in range(5) %}
            <tr style="padding:0;">
                {% for tci in range(4) %}
                <td
                  class="text-left word-panel"
                  style="padding:0;align-items:stretch;">
                  <button type="button"
                          class="button-16"
                          style="margin:0;"
                          id="neighbor-btn-{{tri*4 + tci}}"
                  </button>
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
<script type="module">
    //Boostrapping
    import {
        setup,
        hint_callback,
        word_button_callback,
        game_start_dialog_init,
        game_start_dialog_close,
        game_end_dialog_close
    } from './main.js';

    //Hint button
    document.getElementById('hint_btn').addEventListener('click', hint_callback);

    //Buttons
    for(let i = 0; i < 20; ++i){
        let button_elem = document.getElementById("neighbor-btn-" + i);
        button_elem.addEventListener('click', ev => word_button_callback(ev.currentTarget, ev));
    }

    //Dialog
    document.getElementById("game_start_dialog_start_btn").addEventListener('click', game_start_dialog_close);
    document.getElementById("game_end_dialog_start_btn").addEventListener('click', game_end_dialog_close);

    //Finally window looad
    window.addEventListener('load', setup)
    window.addEventListener('load', game_start_dialog_init)
</script>

</body>
</html>
